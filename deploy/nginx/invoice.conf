# /etc/nginx/sites-available/invoice.conf
# Update server_name and certificate paths for your domain.

upstream invoice_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream invoice_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name invoice.example.com;

    client_max_body_size 10M;

    # Allow Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all regular traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name invoice.example.com;

    ssl_certificate /etc/letsencrypt/live/invoice.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/invoice.example.com/privkey.pem;

    client_max_body_size 10M;

    # Media files (uploaded logos + generated exports)
    location /media/ {
        alias /opt/invoice/backend/media/;
        autoindex off;
        add_header Cache-Control "public, max-age=300";
    }

    # FastAPI routes
    location /api/ {
        proxy_pass http://invoice_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # Optional docs and health endpoint through backend
    location /docs {
        proxy_pass http://invoice_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://invoice_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://invoice_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js app and static assets
    location /_next/ {
        proxy_pass http://invoice_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://invoice_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
